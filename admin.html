<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin Panel - FieldPress AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body class="bg-slate-950 text-white">
    <div class="min-h-screen md:flex">
      <aside
        class="w-full border-r border-white/10 bg-slate-950 p-6 md:min-h-screen md:w-72">
        <div class="mb-10 flex items-center gap-3">
          <div
            class="grid h-12 w-12 place-items-center rounded-2xl bg-cyan-400 font-black text-black">
            FP
          </div>

          <div>
            <h1 class="font-black">FieldPress AI</h1>
            <p class="text-sm text-slate-400">Admin Control</p>
          </div>
        </div>

        <nav class="space-y-3 text-slate-300">
          <a href="dashboard.html" class="block py-2 hover:text-cyan-300"
            >Dashboard</a
          >
          <a href="pricing.html" class="block py-2 hover:text-cyan-300"
            >Pricing</a
          >
          <a href="admin.html" class="block py-2 text-cyan-300">Admin Panel</a>
          <button id="logoutBtn" class="py-2 text-left hover:text-red-300">
            Logout
          </button>
        </nav>
      </aside>

      <section class="flex-1">
        <header class="border-b border-white/10 p-6">
          <h1 class="text-3xl font-black">Admin Billing Panel</h1>
          <p class="mt-2 text-slate-400">
            Revenue, billing, AI usage, user management, audit log, dan export
            laporan.
          </p>
        </header>

        <main class="space-y-10 p-6">
          <section>
            <div id="revenueAnalytics"></div>
          </section>

          <section>
            <div id="aiUsageDashboard"></div>
          </section>

          <section>
            <div id="userManagementAdmin"></div>
          </section>

          <section>
            <div id="revenueChart"></div>
          </section>

          <section>
            <div id="adminAuditLogs"></div>
          </section>

          <section>
            <div
              class="mb-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
              <div>
                <h2 class="text-2xl font-black">Billing Requests</h2>
                <p class="text-sm text-slate-400">
                  Permintaan upgrade dan top up user.
                </p>
              </div>

              <button
                id="refreshBtn"
                class="rounded-2xl border border-white/10 bg-white/[0.05] px-5 py-3 font-bold hover:bg-white/10">
                Refresh
              </button>
            </div>

            <div id="billingRequests" class="grid gap-5"></div>
          </section>
        </main>
      </section>
    </div>

    <script type="module" src="./assets/js/admin.js"></script>
  </body>
</html>
